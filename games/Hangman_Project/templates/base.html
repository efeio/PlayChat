<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mini Oyunlar{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --bg-elevated: #050505;
      --surface: #0a0a0a;
      --surface-edge: rgba(255, 255, 255, 0.09);
      --text: #e8e8e8;
      --muted: #6e6e6e;
      --accent: #f0f0f0;
      --accent-dim: #9a9a9a;
      --line-subtle: rgba(255, 255, 255, 0.04);
      --danger: #a85a5a;
      --success: #6a8a6a;
      --noir-gallows: #4a4a4a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", system-ui, sans-serif;
      font-weight: 400;
      background-color: var(--bg);
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, transparent 28%),
        repeating-linear-gradient(
          -18deg,
          transparent,
          transparent 88px,
          var(--line-subtle) 88px,
          var(--line-subtle) 89px
        );
      color: var(--text);
      line-height: 1.55;
      letter-spacing: 0.02em;
    }
    a {
      color: var(--accent-dim);
      text-decoration: none;
      font-weight: 500;
    }
    a:hover {
      text-decoration: underline;
      color: var(--accent);
    }
    .wrap {
      max-width: 36rem;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }
    .card {
      background: linear-gradient(165deg, var(--surface) 0%, var(--bg) 100%);
      border-radius: 2px;
      padding: 1.5rem 1.6rem;
      border: 1px solid var(--surface-edge);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.03) inset,
        0 32px 64px rgba(0, 0, 0, 0.85);
    }
    h1 {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-size: 1.85rem;
      font-weight: 600;
      margin: 0 0 1rem;
      letter-spacing: 0.04em;
      line-height: 1.2;
    }
    h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.78rem;
      margin: 1.35rem 0 0.5rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .muted { color: var(--muted); font-size: 0.9rem; font-weight: 300; }
    .error {
      background: rgba(184, 92, 92, 0.1);
      border: 1px solid rgba(184, 92, 92, 0.35);
      color: #e8a8a8;
      padding: 0.75rem 1rem;
      border-radius: 2px;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: #000000;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
      font-family: inherit;
    }
    input:focus {
      outline: 1px solid rgba(255, 255, 255, 0.45);
      outline-offset: 2px;
      border-color: rgba(255, 255, 255, 0.28);
    }
    button, .btn {
      display: inline-block;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0.65rem 1.35rem;
      border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: #f5f5f5;
      color: #000000;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    button:hover, .btn:hover {
      background: #ffffff;
      text-decoration: none;
    }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-secondary:hover {
      border-color: rgba(255, 255, 255, 0.45);
      color: #ffffff;
      background: rgba(255, 255, 255, 0.04);
    }
    .pattern {
      font-family: ui-monospace, "Cascadia Code", monospace;
      font-size: 1.75rem;
      letter-spacing: 0.18em;
      margin: 1rem 0;
      word-break: break-all;
      color: var(--text);
    }
    .stats { margin: 0.75rem 0; }
    .pill {
      display: inline-block;
      padding: 0.22rem 0.6rem;
      border-radius: 2px;
      background: #000000;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.8rem;
      margin-right: 0.35rem;
      font-weight: 500;
    }
    .nav-top {
      margin-bottom: 1rem;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
    }
    form.inline-letter { margin-top: 1rem; }
    form.inline-letter input[type="text"] {
      max-width: 4rem;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 0;
      margin-right: 0.5rem;
      display: inline-block;
      width: auto;
    }
    form.inline-letter button { vertical-align: middle; }

    /* Adam asmaca SVG — tema renkleri (şablonlarda sabit hex bırakılabilir) */
    .hangman-svg > g:not(.hangman-part) {
      stroke: var(--noir-gallows) !important;
    }
    .hangman-svg g.hangman-part {
      stroke: var(--accent) !important;
    }
    .hangman-figure-wrap {
      background: #000000 !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="wrap">
    <nav class="nav-top"><a href="{{ url_for('index') }}">← Ana sayfa</a></nav>
    {% block body %}{% endblock %}
  </div>
</body>
</html>
